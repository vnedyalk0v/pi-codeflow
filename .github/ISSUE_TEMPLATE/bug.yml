name: Bug
description: Report incorrect or unsafe Codeflow behavior.
title: "[Bug] "
labels: ["type:bug", "status:needs-design"]
body:
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide minimal steps or a linked example.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Pi version, OS, repository type, and relevant config.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this issue to be complete?
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Links, screenshots, prior art, or constraints.
    validations:
      required: false
