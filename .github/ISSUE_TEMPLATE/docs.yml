name: Documentation
description: Request or improve documentation.
title: "[Docs] "
labels: ["type:docs", "area:docs", "status:ready"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or topic
      description: Which docs need work?
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Requested change
      description: What should be added, removed, or clarified?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this issue to be complete?
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Links, screenshots, prior art, or constraints.
    validations:
      required: false
