name: Security hardening
description: Improve Codeflow safety boundaries.
title: "[Security] "
labels: ["type:security", "area:security", "status:needs-design"]
body:
  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: What security or safety risk should be addressed?
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Proposed boundary
      description: What should be blocked, warned, logged, or documented?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: How could this affect normal workflows?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this issue to be complete?
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Links, screenshots, prior art, or constraints.
    validations:
      required: false
