name: Task
description: Track planned project work.
title: "[Task] "
labels: ["type:task", "status:ready"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What work should be completed?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and excluded?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this issue to be complete?
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Links, screenshots, prior art, or constraints.
    validations:
      required: false
